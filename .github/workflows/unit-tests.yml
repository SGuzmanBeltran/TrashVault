name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run lint
        run: ./scripts/ci-lint.sh

  typecheck:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run type-check
        run: ./scripts/ci-typecheck.sh

  unit-tests:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run unit tests
        run: ./scripts/ci-unit-tests.sh
